<!-- LOGIN -->
<div id="loginScreen" class="hidden">
  <div style="display:flex;flex-direction:column;align-items:center;width:100%;max-width:400px">

<script>
// ══════════════════════════════════════════════════════════════
//  ▼▼▼  FILL IN YOUR SUPABASE DETAILS HERE  ▼▼▼

// ── CLOUD / LOCAL STORAGE ────────────────────────────────────
const SB_HEADERS={
  'apikey':SUPABASE_KEY,
  'Authorization':`Bearer ${SUPABASE_KEY}`,
  'Content-Type':'application/json',
  'Prefer':'return=minimal'
};

async function loadEntries(){
  if(USE_CLOUD){
    try{
      const r=await fetch(`${SUPABASE_URL}/rest/v1/cb_entries?select=*&order=ts.asc`,{headers:SB_HEADERS});
      if(r.ok){ENTRIES=await r.json();return;}
    }catch(e){}
  }
  ENTRIES=JSON.parse(localStorage.getItem('cb_entries')||'[]');
}

async function saveEntry(rec){
  ENTRIES.push(rec);
  if(USE_CLOUD){
    try{
      await fetch(`${SUPABASE_URL}/rest/v1/cb_entries`,{method:'POST',headers:SB_HEADERS,body:JSON.stringify(rec)});
      localStorage.setItem('cb_upd',Date.now());
      return;
    }catch(e){ showToast('⚠️ Cloud save failed, saved locally','#D97706'); }
  }
  localStorage.setItem('cb_entries',JSON.stringify(ENTRIES));
  localStorage.setItem('cb_upd',Date.now());
}

async function clearAllEntries(){
  if(USE_CLOUD){
    try{
      await fetch(`${SUPABASE_URL}/rest/v1/cb_entries?dep=gte.0`,{method:'DELETE',headers:SB_HEADERS});
    }catch(e){}
  }
  localStorage.setItem('cb_entries','[]');
  ENTRIES=[];
}

// ── HELPERS ──────────────────────────────────────────────────
const getEmp=id=>EMPLOYEES.find(e=>e.id===id);
const getBr=id=>BRANCHES.find(b=>b.id===id);
const getBrEmps=brId=>EMPLOYEES.filter(e=>e.br===brId&&e.role!=='admin');
const today=()=>new Date().toISOString().slice(0,10);
const fmtD=s=>{if(!s)return'';const[y,m,d]=s.split('-');return`${d}-${m}-${y}`;};
const fmtT=ts=>{if(!ts)return'';try{return new Date(ts).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});}catch{return'';}};
const L=n=>(+(n||0)).toFixed(2)+' L';
const INI=nm=>nm.trim().split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase();
const PCT=(a,t)=>t?Math.min(+(a/t*100).toFixed(1),999.9):0;
const CLR=p=>p>=75?'var(--green)':p>=50?'var(--amber)':'var(--red)';
const LBL=p=>p>=100?'Excellent':p>=75?'On Track':p>=50?'At Risk':'Critical';

function empTot(id,type){
  const all=ENTRIES.filter(e=>e.empId===id);
  const t=today(),[y,m]=t.split('-');
  const FY=['2026-04','2026-05','2026-06','2026-07','2026-08','2026-09','2026-10','2026-11','2026-12','2027-01','2027-02','2027-03'];
  const sum=arr=>arr.reduce((a,e)=>({dep:a.dep+(+e.dep||0),adv:a.adv+(+e.adv||0)}),{dep:0,adv:0});
  if(type==='day') return sum(all.filter(e=>e.date===t));
  if(type==='week'){const w=new Date();w.setDate(w.getDate()-7);return sum(all.filter(e=>new Date(e.date)>=w));}
  if(type==='month') return sum(all.filter(e=>e.date.startsWith(y+'-'+m)));
  if(type==='year') return sum(all.filter(e=>FY.some(f=>e.date.startsWith(f))));
  return{dep:0,adv:0};
}
function brTot(brId,type){return getBrEmps(brId).reduce((t,e)=>{const v=empTot(e.id,type);return{dep:t.dep+v.dep,adv:t.adv+v.adv};},{dep:0,adv:0});}
function prog(p,c){const col=c||CLR(p);return`<div class="prog"><div class="prog-fill" style="width:${Math.min(p,100)}%;background:${col}"></div></div><div class="prog-lbl">${p.toFixed(1)}% achieved</div>`;}
function badge(p){return`<span class="badge" style="background:${CLR(p)}">${LBL(p)}</span>`;}
function circProgress(p){
  const r=50,c=2*Math.PI*r,fill=(Math.min(p,100)/100)*c,color=CLR(p);
  return`<div class="circ-wrap"><div class="circ-svg-wrap"><svg width="120" height="120" viewBox="0 0 120 120"><circle cx="60" cy="60" r="${r}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="10"/><circle cx="60" cy="60" r="${r}" fill="none" stroke="${color}" stroke-width="10" stroke-dasharray="${fill} ${c}" stroke-linecap="round"/></svg><div class="circ-inner"><div class="circ-pct" style="color:${color}">${p.toFixed(1)}%</div><div class="circ-lbl">Overall</div></div></div></div>`;
}
function perfBlock(title,dT,aT,dA,aA){
  const dp=PCT(dA,dT),ap=PCT(aA,aT),op=(dp+ap)/2;
  return`<div class="perf-card"><div class="ph"><span class="ph-title">${title}</span>${badge(op)}</div>
  <div style="background:rgba(255,255,255,.04);border-radius:10px;padding:10px;margin-bottom:10px">
    <div class="prow"><span class="pl">🏦 Deposit Target</span><span class="pv sv-gold">${L(dT)}</span></div>
    <div class="prow"><span class="pl">✅ Achieved</span><span class="pv sv-green">${L(dA)}</span></div>
    <div class="prow"><span class="pl">❌ Gap</span><span class="pv sv-red">${L(Math.max(0,dT-dA))}</span></div>${prog(dp)}</div>
  <div style="background:rgba(255,255,255,.04);border-radius:10px;padding:10px">
    <div class="prow"><span class="pl">💰 Advance Target</span><span class="pv sv-gold">${L(aT)}</span></div>
    <div class="prow"><span class="pl">✅ Achieved</span><span class="pv sv-green">${L(aA)}</span></div>
    <div class="prow"><span class="pl">❌ Gap</span><span class="pv sv-red">${L(Math.max(0,aT-aA))}</span></div>${prog(ap)}</div></div>`;
}

function navigate(page,data,addToStack=true){
  if(addToStack) NAV.push({page,data});
  updateTopbar();
  document.getElementById('mainContent').innerHTML='<div class="loading"><div class="spinner"></div></div>';
  setTimeout(()=>{
    switch(page){
      case 'emp':renderEmpPage(data);break;
      case 'mgr':renderMgrPage();break;
      case 'mgrEmp':renderMgrEmpPage(data);break;
      case 'ho':renderHOPage();break;
      case 'hoBranches':renderHOBranches();break;
      case 'hoBranch':renderHOBranch(data);break;
      case 'hoEmp':renderHOEmpPage(data);break;
      case 'hoDir':renderHODirectory();break;
      case 'hoAnalytics':renderHOAnalytics();break;
      case 'hoGap':renderHOGap();break;
    }
  },50);
}
function goBack(){if(NAV.length<=1)return;NAV.pop();const p=NAV[NAV.length-1];navigate(p.page,p.data,false);}
function updateTopbar(){
  const cur=NAV[NAV.length-1],hasBack=NAV.length>1;
  const tbL=document.getElementById('tbLeft'),tbR=document.getElementById('tbRight');
  if(!tbL)return;
  tbL.innerHTML=`${hasBack?`<button class="back-btn" onclick="goBack()">&#8592;</button>`:''}
    <div><div class="tb-title" id="tbTitle"></div><div class="tb-sub" id="tbSub"></div></div>`;
  if(CU&&CU.role==='admin'){
    tbR.innerHTML=`<button class="reset-btn" onclick="openResetDlg()">⚠️ Reset</button><button class="logout-btn" onclick="doLogout()">Logout</button>`;
  }else{
    tbR.innerHTML=`<button class="logout-btn" onclick="doLogout()">Logout</button>`;
  }
  const tt=document.getElementById('tbTitle'),ts=document.getElementById('tbSub');
  if(!cur||!tt)return;
  const syncIcon=USE_CLOUD?`<span class="sync-dot"></span>`:`<span class="offline-dot"></span>`;
  switch(cur.page){
    case 'emp':         tt.textContent=CU.name.split(' ')[0]+"'s Dashboard";ts.innerHTML=syncIcon+(getBr(CU.br)?.name||'');break;
    case 'mgr':         tt.textContent='Branch Dashboard';ts.innerHTML=syncIcon+(getBr(CU.br)?.name||'');break;
    case 'mgrEmp':      {const e=getEmp(cur.data);tt.textContent=e?e.name.split(' ')[0]:'Employee';ts.textContent=e?e.desig:'';break;}
    case 'ho':          tt.textContent='Head Office';ts.innerHTML=syncIcon+'Coastal Bank · All Branches';break;
    case 'hoBranches':  tt.textContent='All Branches';ts.textContent='11 branches';break;
    case 'hoBranch':    {const b=getBr(cur.data);tt.textContent=b?b.name:'Branch';ts.textContent=getBrEmps(cur.data).length+' members';break;}
    case 'hoEmp':       {const e=getEmp(cur.data);tt.textContent=e?e.name:'Employee';ts.textContent=e?e.desig:'';break;}

function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}

async function doLogin(){
  const rawId=document.getElementById('loginId').value.trim();
  const id=rawId.toUpperCase();
  const pw=document.getElementById('loginPw').value;
  const err=document.getElementById('loginErr');
  const btn=document.getElementById('loginBtn');
  err.textContent='';
  if(!rawId||!pw){err.textContent='Please enter Employee ID and Password.';return;}
  // Try both uppercase and original
  const emp=EMPLOYEES.find(e=>e.id===id)||EMPLOYEES.find(e=>e.id===rawId);
  if(!emp||PWD[emp.id]!==pw){err.textContent='Invalid Employee ID or Password.';return;}
  btn.disabled=true;btn.textContent='Logging in…';
  CU=emp;
  localStorage.setItem('cb_session',emp.id);
  await loadEntries();
  hide('loginScreen');show('appShell');
  btn.disabled=false;btn.textContent='LOGIN →';
  startApp();
}

function doLogout(){
  localStorage.removeItem('cb_session');CU=null;NAV=[];ENTRIES=[];
  hide('appShell');
  document.getElementById('loginId').value='';
  document.getElementById('loginPw').value='';
  show('loginScreen');
}

function startApp(){
  NAV=[];
  if(CU.role==='admin')         navigate('ho',null);
  else if(CU.role==='manager')  navigate('mgr',null);
  else                          navigate('emp',null);
}

window.addEventListener('load',async()=>{
  show('loginScreen');
  const s=localStorage.getItem('cb_session');
  if(s){
    const e=getEmp(s);
    if(e){
      CU=e;
      document.getElementById('mainContent').innerHTML='<div class="loading"><div class="spinner"></div><span style="color:var(--muted)">Loading…</span></div>';
      await loadEntries();
      hide('loginScreen');show('appShell');
      startApp();
    }
  }
});

  document.getElementById('mainContent').innerHTML=`<div class="sec-lbl">All 11 Branches</div>`+
    BRANCHES.map(b=>{const yt=brTot(b.id,'year');const dp=PCT(yt.dep,b.depT),ap=PCT(yt.adv,b.advT),op=(dp+ap)/2;const bm=getBrEmps(b.id).find(e=>['BM','BH'].includes(e.desig));const emps=getBrEmps(b.id);
      return`<div class="br-card" onclick="navigate('hoBranch','${b.id}')">
        <div class="br-head"><div><div class="br-name">${b.name}</div><div class="br-mgr">${bm?bm.name:''} · ${emps.length} staff</div></div>
          <span class="badge" style="background:${CLR(op)}">${op.toFixed(1)}%</span></div>
        <div class="br-grid">
          <div class="br-stat"><div class="bl">Deposit Target</div><div class="bv">${L(b.depT)}</div></div>
          <div class="br-stat"><div class="bl">Deposit Achieved</div><div class="bv sv-green">${L(yt.dep)}</div></div>
          <div class="br-stat"><div class="bl">Deposit Gap</div><div class="bv sv-red">${L(Math.max(0,b.depT-yt.dep))}</div></div>
          <div class="br-stat"><div class="bl">Advance Gap</div><div class="bv sv-red">${L(Math.max(0,b.advT-yt.adv))}</div></div>
        </div>${prog(op)}</div>`;}).join('');
}
function renderHOBranch(brId){
  const br=getBr(brId),emps=getBrEmps(brId),yt=brTot(brId,'year');
  const dp=PCT(yt.dep,br.depT),ap=PCT(yt.adv,br.advT),op=(dp+ap)/2;
  document.getElementById('mainContent').innerHTML=`
    <div class="sum-card">${circProgress(op)}
      <div class="srow"><span class="sl">Deposit Target</span><span class="sv">${L(br.depT)}</span></div>
      <div class="srow"><span class="sl">Deposits Achieved</span><span class="sv sv-green">${L(yt.dep)}</span></div>
      <div class="srow"><span class="sl">Deposit Gap</span><span class="sv sv-red">${L(Math.max(0,br.depT-yt.dep))}</span></div>
      <div class="srow"><span class="sl">Advance Target</span><span class="sv">${L(br.advT)}</span></div>
      <div class="srow"><span class="sl">Advances Achieved</span><span class="sv sv-green">${L(yt.adv)}</span></div>
      <div class="srow"><span class="sl">Advance Gap</span><span class="sv sv-red">${L(Math.max(0,br.advT-yt.adv))}</span></div>
      <div class="srow"><span class="sl">Opening Balance (31.03.26)</span><span class="sv sv-gold">${L(br.opDep)} Dep · ${L(br.opAdv)} Adv</span></div>
    </div>
    <div class="sec-lbl">Team Members (${emps.length})</div>
    ${emps.map(e=>{const ya=empTot(e.id,'year');const p=PCT((ya.dep+ya.adv)/2,(e.depT+e.advT)/2);
      return`<div class="member-row" onclick="navigate('hoEmp','${e.id}')">
        <div class="m-avatar">${INI(e.name)}</div>
        <div class="m-info"><div class="m-name">${e.name}</div><div class="m-des">${e.desig} · EMP # ${e.id}</div></div>
        <span class="badge" style="background:${CLR(p)};flex-shrink:0">${p.toFixed(1)}%</span>
      </div>`;}).join('')}`;
}
function renderHOEmpPage(empId){
  const emp=getEmp(empId);if(!emp)return;
  const br=getBr(emp.br),ya=empTot(emp.id,'year');
  document.getElementById('mainContent').innerHTML=`
    <div class="profile-card"><div class="avatar">${INI(emp.name)}</div>
      <div style="min-width:0"><div class="p-name">${emp.name}</div><div class="p-eid">Employee # ${emp.id}</div>
        <div class="p-det"><span style="background:var(--accent);padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700">${emp.desig}</span> ${br?br.name:''}<br>📱 ${emp.mob}</div></div></div>
    <div class="tgrid" style="margin-top:12px">
      <div class="tcard"><div class="tl">Annual Deposit</div><div class="tv">${L(emp.depT)}</div></div>
      <div class="tcard"><div class="tl">Annual Advance</div><div class="tv">${L(emp.advT)}</div></div>
      <div class="tcard"><div class="tl">Monthly Deposit</div><div class="tv">${L(+(emp.depT/12).toFixed(2))}</div></div>
      <div class="tcard"><div class="tl">Monthly Advance</div><div class="tv">${L(+(emp.advT/12).toFixed(2))}</div></div>
      <div class="tcard"><div class="tl">FY25-26 Dep Closing</div><div class="tv">${L(emp.p26d)}</div><div class="ts">31.03.2026</div></div>
      <div class="tcard"><div class="tl">FY25-26 Adv Closing</div><div class="tv">${L(emp.p26a)}</div><div class="ts">31.03.2026</div></div>
    </div>
    <div id="empPerfZone"></div><div id="empHistZone"></div>
    <div class="edit-card"><h3>✏️ Add Entry for ${emp.name}</h3>
      <div class="erow">
        <div class="ef"><label>Deposits (Lakhs)</label><input type="number" step="0.01" min="0" id="hoDep" placeholder="0.00" inputmode="decimal"/></div>
        <div class="ef"><label>Advances (Lakhs)</label><input type="number" step="0.01" min="0" id="hoAdv" placeholder="0.00" inputmode="decimal"/></div>
      </div><button class="btn-save" onclick="hoSaveEntry('${empId}')">💾 Save Entry</button></div>`;
  document.getElementById('empPerfZone').innerHTML=perfBlock('FY 2026-27 Annual',emp.depT,emp.advT,ya.dep,ya.adv);renderEmpHist(emp.id);
}
async function hoSaveEntry(empId){
  const dep=parseFloat(document.getElementById('hoDep').value)||0,adv=parseFloat(document.getElementById('hoAdv').value)||0;
  if(!dep&&!adv){showToast('Enter at least one value','#D97706');return;}
  await saveEntry({id:Date.now().toString(),empId,date:today(),ts:new Date().toISOString(),dep,adv});
  document.getElementById('hoDep').value='';document.getElementById('hoAdv').value='';
  showToast('✅ Entry saved!');
  const emp=getEmp(empId),ya=empTot(empId,'year');
  document.getElementById('empPerfZone').innerHTML=perfBlock('FY 2026-27 Annual',emp.depT,emp.advT,ya.dep,ya.adv);renderEmpHist(empId);
}
function renderHODirectory(){
  document.getElementById('mainContent').innerHTML=`
    <input class="search-inp" id="dirQ" placeholder="🔍 Search name or Employee ID..." oninput="filterDir()" autocomplete="off"/>
    <div class="frow">
      <select class="fsel" id="dirBr" onchange="filterDir()"><option value="">All Branches</option>${BRANCHES.map(b=>`<option value="${b.id}">${b.name}</option>`).join('')}</select>
      <select class="fsel" id="dirDes" onchange="filterDir()"><option value="">All Roles</option>${['BM','BH','CSO','CRO','CSH'].map(d=>`<option>${d}</option>`).join('')}</select>
      <select class="fsel" id="dirBand" onchange="filterDir()"><option value="">All Performance</option>${['Excellent','On Track','At Risk','Critical'].map(b=>`<option>${b}</option>`).join('')}</select>
    </div><div id="dirList"></div>`;
  filterDir();
}
function filterDir(){
  const q=(document.getElementById('dirQ')?.value||'').toLowerCase(),br=document.getElementById('dirBr')?.value,des=document.getElementById('dirDes')?.value,band=document.getElementById('dirBand')?.value;
  let emps=EMPLOYEES.filter(e=>e.role!=='admin');
  if(q) emps=emps.filter(e=>e.name.toLowerCase().includes(q)||e.id.toLowerCase().includes(q));
  if(br) emps=emps.filter(e=>e.br===br);
  if(des) emps=emps.filter(e=>e.desig===des);
  if(band) emps=emps.filter(e=>{const ya=empTot(e.id,'year');return LBL(PCT((ya.dep+ya.adv)/2,(e.depT+e.advT)/2))===band;});
  const el=document.getElementById('dirList');if(!el)return;
  if(!emps.length){el.innerHTML='<div class="empty">No employees found.</div>';return;}
  el.innerHTML=emps.map(e=>{const ya=empTot(e.id,'year');const p=PCT((ya.dep+ya.adv)/2,(e.depT+e.advT)/2);const b=getBr(e.br);
    return`<div class="member-row" onclick="navigate('hoEmp','${e.id}')">
      <div class="m-avatar">${INI(e.name)}</div>
      <div class="m-info"><div class="m-name">${e.name}</div><div class="m-des">${e.desig} · ${b?b.name:''} · #${e.id}</div></div>
      <span class="badge" style="background:${CLR(p)};flex-shrink:0">${p.toFixed(1)}%</span>
    </div>`;}).join('');
}
function renderHOAnalytics(){
  const ranked=[...EMPLOYEES.filter(e=>e.role!=='admin')].map(e=>{const ya=empTot(e.id,'year');const p=PCT((ya.dep+ya.adv)/2,(e.depT+e.advT)/2);return{...e,ya,p};}).sort((a,b)=>b.p-a.p);
  const brRanked=[...BRANCHES].map(b=>{const yt=brTot(b.id,'year');const dp=PCT(yt.dep,b.depT),ap=PCT(yt.adv,b.advT);return{...b,yt,dp,ap,op:(dp+ap)/2};}).sort((a,b)=>b.op-a.op);
  document.getElementById('mainContent').innerHTML=`
    <div class="sec-lbl">🏆 Employee Rankings</div>
    ${ranked.map((e,i)=>{const b=getBr(e.br);return`<div class="ana-row" onclick="navigate('hoEmp','${e.id}')">
      <div class="ana-head"><div><div class="ana-name">#${i+1} ${e.name}${e.p>=100?' ⭐':''}</div><div class="ana-branch">${e.desig} · ${b?b.name:''} · EMP #${e.id}</div></div>
        <span class="badge" style="background:${CLR(e.p)}">${e.p.toFixed(1)}%</span></div>
      <div class="prow"><span class="pl">Deposits</span><span class="pv">${L(e.ya.dep)} / ${L(e.depT)}</span></div>
      <div class="prow"><span class="pl">Advances</span><span class="pv">${L(e.ya.adv)} / ${L(e.advT)}</span></div>${prog(e.p)}</div>`;}).join('')}
    <div class="sec-lbl" style="margin-top:16px">🏦 Branch Rankings</div>
    ${brRanked.map((b,i)=>`<div class="ana-row" onclick="navigate('hoBranch','${b.id}')">
      <div class="ana-head"><div><div class="ana-name">#${i+1} ${b.name}</div><div class="ana-branch">${getBrEmps(b.id).length} staff</div></div>
        <span class="badge" style="background:${CLR(b.op)}">${b.op.toFixed(1)}%</span></div>
      <div class="prow"><span class="pl">Deposits</span><span class="pv">${L(b.yt.dep)} / ${L(b.depT)} (${b.dp.toFixed(1)}%)</span></div>
      <div class="prow"><span class="pl">Advances</span><span class="pv">${L(b.yt.adv)} / ${L(b.advT)} (${b.ap.toFixed(1)}%)</span></div>${prog(b.op)}</div>`).join('')}`;
}
function renderHOGap(){
  const emps=[...EMPLOYEES.filter(e=>e.role!=='admin')].map(e=>{const ya=empTot(e.id,'year');return{...e,ya,dg:Math.max(0,e.depT-ya.dep),ag:Math.max(0,e.advT-ya.adv),p:PCT((ya.dep+ya.adv)/2,(e.depT+e.advT)/2)};}).sort((a,b)=>(b.dg+b.ag)-(a.dg+a.ag));
  document.getElementById('mainContent').innerHTML=`
    <div class="sec-lbl">Employees — Highest Gap First</div>
    ${emps.map(e=>{const b=getBr(e.br);return`<div class="ana-row" onclick="navigate('hoEmp','${e.id}')">
      <div class="ana-head"><div><div class="ana-name">${e.name}</div><div class="ana-branch">${e.desig} · ${b?b.name:''}</div></div>
        <span class="badge" style="background:${CLR(e.p)}">${e.p.toFixed(1)}%</span></div>
      <div class="prow"><span class="pl">Deposit Gap</span><span class="pv sv-red">${L(e.dg)}</span></div>
      <div class="prow"><span class="pl">Advance Gap</span><span class="pv" style="color:var(--amber)">${L(e.ag)}</span></div>
    </div>`;}).join('')}
    <div class="sec-lbl" style="margin-top:16px">Branch Gap Summary</div>
    ${BRANCHES.map(b=>{const yt=brTot(b.id,'year');const dg=Math.max(0,b.depT-yt.dep),ag=Math.max(0,b.advT-yt.adv);const op=(PCT(yt.dep,b.depT)+PCT(yt.adv,b.advT))/2;
      return`<div class="ana-row" onclick="navigate('hoBranch','${b.id}')">
        <div class="ana-head"><div class="ana-name">${b.name}</div><span class="badge" style="background:${CLR(op)}">${op.toFixed(1)}%</span></div>
        <div class="prow"><span class="pl">Deposit Gap</span><span class="pv sv-red">${L(dg)}</span></div>
        <div class="prow"><span class="pl">Advance Gap</span><span class="pv" style="color:var(--amber)">${L(ag)}</span></div>
      </div>`;}).join('')}`;
}

function showToast(msg,color='#1A7A4A'){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');t.className='toast';t.textContent=msg;t.style.background=color;t.style.color='#fff';
  document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
}
</script>
</body>
