<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Coastal Bank — Staff Performance</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--navy:#0A1628;--mid:#132240;--card:#1a2d4a;--accent:#1E3A5F;--gold:#C9A84C;--gold2:#e8c76a;--green:#1A7A4A;--amber:#D97706;--red:#C0392B;--white:#fff;--muted:#8FA3BF;--border:#1e3558}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--navy);color:#fff;min-height:100vh}
.hidden{display:none!important}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}
#loginScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 50% 0%,#0d2040 0%,var(--navy) 70%)}
.logo-wrap{width:110px;height:110px;border-radius:50%;overflow:hidden;border:3px solid var(--gold);box-shadow:0 0 40px rgba(201,168,76,.35);margin-bottom:14px}
.logo-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.app-title{font-size:26px;font-weight:900;letter-spacing:2px;text-align:center}
.app-sub{font-size:11px;color:var(--gold);letter-spacing:1.5px;margin-top:4px;margin-bottom:24px;text-transform:uppercase;text-align:center}
.login-box{background:var(--mid);border:1px solid var(--border);border-radius:20px;padding:28px 24px;width:100%;max-width:360px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.lbl{display:block;font-size:10px;color:var(--muted);margin-bottom:6px;letter-spacing:.8px;text-transform:uppercase;font-weight:600}
.inp{width:100%;background:var(--accent);border:1.5px solid var(--border);border-radius:10px;padding:13px 14px;color:#fff;font-size:16px;outline:none;-webkit-appearance:none;margin-bottom:14px;display:block}
.inp:focus{border-color:var(--gold)}
.btn-login{width:100%;background:linear-gradient(135deg,#b8932a,var(--gold),var(--gold2));color:var(--navy);font-size:15px;font-weight:800;padding:16px;border:none;border-radius:12px;cursor:pointer;box-shadow:0 4px 15px rgba(201,168,76,.4);min-height:50px;display:block}
.err{color:#ff6b6b;font-size:12px;text-align:center;margin-top:10px;min-height:16px}
.topbar{background:var(--mid);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;min-height:56px;gap:8px}
.tb-l{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.back-btn{width:42px;height:42px;min-width:42px;background:var(--accent);border:1px solid var(--border);border-radius:10px;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tb-title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-sub{font-size:10px;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-r{display:flex;gap:6px;flex-shrink:0}
.btn-logout{background:transparent;border:1px solid rgba(192,57,43,.6);color:#e74c3c;padding:8px 12px;border-radius:10px;cursor:pointer;font-size:12px;font-weight:600;min-height:38px}
.btn-reset{background:rgba(192,57,43,.12);border:1px solid rgba(192,57,43,.4);color:#e74c3c;padding:8px 10px;border-radius:10px;cursor:pointer;font-size:11px;font-weight:600;min-height:38px}
.content{padding:14px;max-width:680px;margin:0 auto;padding-bottom:60px}
.sec-lbl{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;gap:8px;margin:20px 0 12px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border)}
.profile-card{background:linear-gradient(135deg,var(--mid),var(--card));border:1px solid var(--border);border-radius:18px;padding:18px;display:flex;align-items:center;gap:14px;margin-bottom:4px}
.avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#1e3a5f,#0d2040);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:var(--gold);flex-shrink:0}
.p-name{font-size:16px;font-weight:800}
.p-eid{font-size:11px;color:var(--gold);font-weight:700;margin-top:3px}
.p-det{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.75}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.tcard{background:var(--mid);border:1px solid var(--border);border-radius:13px;padding:13px}
.tl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.tv{font-size:17px;font-weight:800;color:var(--gold);margin-top:4px}
.ts{font-size:10px;color:var(--muted);margin-top:2px}
.entry-form{background:linear-gradient(135deg,var(--mid),var(--card));border:1.5px solid var(--gold);border-radius:16px;padding:16px}
.ef-title{font-size:12px;font-weight:700;color:var(--gold);text-transform:uppercase;margin-bottom:12px}
.erow{display:flex;gap:10px;margin-bottom:12px}
.ef{flex:1}
.ef label{display:block;font-size:10px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;font-weight:600}
.ef input{width:100%;background:var(--accent);border:1.5px solid var(--border);border-radius:10px;padding:13px;color:#fff;font-size:16px;font-weight:600;outline:none;-webkit-appearance:none;text-align:center}
.ef input:focus{border-color:var(--gold)}
.btn-save{width:100%;background:linear-gradient(135deg,#b8932a,var(--gold),var(--gold2));color:var(--navy);font-size:14px;font-weight:800;padding:15px;border:none;border-radius:12px;cursor:pointer;min-height:50px}
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:14px;scrollbar-width:none}
.tabs::-webkit-scrollbar{height:0}
.tab{padding:9px 15px;border-radius:20px;border:1.5px solid var(--border);background:var(--mid);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;min-height:38px;display:flex;align-items:center}
.tab.active{background:var(--gold);color:var(--navy);border-color:var(--gold)}
.perf-card{background:var(--mid);border:1px solid var(--border);border-radius:16px;padding:16px}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.ph-title{font-size:14px;font-weight:700}
.badge{font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;color:#fff;white-space:nowrap}
.prow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px;gap:6px}
.pl{color:var(--muted)}
.pv{font-weight:600;text-align:right}
.prog{height:7px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;margin:5px 0}
.prog-fill{height:100%;border-radius:4px}
.prog-lbl{font-size:11px;color:var(--muted);text-align:right;margin-bottom:8px}
.hist-item{background:var(--mid);border:1px solid var(--border);border-radius:13px;padding:13px 15px;margin-bottom:8px}
.hist-date{font-size:12px;color:var(--gold);font-weight:700}
.hist-row{display:flex;gap:24px;margin-top:7px}
.hist-val .hv{font-size:15px;font-weight:700}
.hist-val .hl{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:600;margin-top:1px}
.member-row{background:var(--mid);border:1px solid var(--border);border-radius:13px;padding:13px 15px;margin-bottom:8px;display:flex;align-items:center;gap:11px;cursor:pointer;min-height:66px}
.member-row:active{border-color:var(--gold)}
.m-avatar{width:42px;height:42px;min-width:42px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#0d2040);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--gold)}
.m-info{flex:1;min-width:0}
.m-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.m-des{font-size:11px;color:var(--muted);margin-top:2px}
.sum-card{background:linear-gradient(135deg,var(--mid),var(--card));border:1px solid var(--border);border-radius:18px;padding:18px}
.srow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px;gap:8px}
.srow:last-child{border-bottom:none}
.sl{color:var(--muted);flex-shrink:0}
.sv{font-weight:600;text-align:right}
.sv-gold{color:var(--gold);font-weight:700}
.sv-green{color:#27ae60;font-weight:700}
.sv-red{color:#e74c3c;font-weight:700}
.circ-wrap{display:flex;flex-direction:column;align-items:center;padding:10px 0}
.circ-svg-wrap{position:relative;width:120px;height:120px}
.circ-svg-wrap svg{transform:rotate(-90deg)}
.circ-inner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.circ-pct{font-size:24px;font-weight:900;line-height:1}
.circ-lbl{font-size:10px;color:var(--muted);margin-top:3px;font-weight:600;text-transform:uppercase}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:4px}
.sbox{background:var(--mid);border:1px solid var(--border);border-radius:13px;padding:13px;text-align:center}
.sbox .sv2{font-size:21px;font-weight:900;color:var(--gold)}
.sbox .sl2{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;font-weight:600}
.br-card{background:var(--mid);border:1px solid var(--border);border-radius:15px;padding:15px;margin-bottom:10px;cursor:pointer}
.br-card:active{border-color:var(--gold)}
.br-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px}
.br-name{font-size:15px;font-weight:800}
.br-mgr{font-size:11px;color:var(--muted);margin-top:3px}
.br-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.br-stat .bl{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:600}
.br-stat .bv{font-size:13px;font-weight:700;margin-top:2px}
.nav-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:4px}
.nav-card{background:var(--mid);border:1px solid var(--border);border-radius:15px;padding:16px;text-align:center;cursor:pointer}
.nav-card:active{border-color:var(--gold)}
.nav-icon{font-size:26px;margin-bottom:7px}
.nav-title{font-size:13px;font-weight:700}
.nav-desc{font-size:11px;color:var(--muted);margin-top:3px}
.ana-row{background:var(--mid);border:1px solid var(--border);border-radius:13px;padding:13px 15px;margin-bottom:8px;cursor:pointer}
.ana-row:active{border-color:var(--gold)}
.ana-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px}
.ana-name{font-size:14px;font-weight:700}
.ana-branch{font-size:11px;color:var(--muted);margin-top:2px}
.search-inp{width:100%;background:var(--mid);border:1.5px solid var(--border);border-radius:12px;padding:13px 16px;color:#fff;font-size:16px;outline:none;margin-bottom:10px;-webkit-appearance:none;display:block}
.frow{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.fsel{background:var(--mid);border:1px solid var(--border);color:#fff;padding:10px 12px;border-radius:10px;font-size:12px;cursor:pointer;outline:none;-webkit-appearance:none;font-weight:600}
.dlg-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.dlg{background:var(--mid);border:1.5px solid var(--gold);border-radius:20px;padding:24px;max-width:360px;width:100%}
.dlg h3{font-size:16px;font-weight:800;color:var(--gold);margin-bottom:16px}
.drow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.07);font-size:14px;gap:8px}
.dactions{display:flex;gap:10px;margin-top:20px}
.btn-cancel{flex:1;background:var(--accent);color:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;font-size:14px;font-weight:600;min-height:50px}
.btn-confirm{flex:1;background:linear-gradient(135deg,#b8932a,var(--gold));color:var(--navy);border:none;border-radius:12px;padding:14px;cursor:pointer;font-size:14px;font-weight:800;min-height:50px}
.btn-danger{flex:1;background:var(--red);color:#fff;border:none;border-radius:12px;padding:14px;cursor:pointer;font-size:14px;font-weight:800;min-height:50px}
.edit-card{background:var(--mid);border:1.5px solid rgba(201,168,76,.35);border-radius:15px;padding:15px;margin-top:12px}
.edit-card h3{font-size:12px;color:var(--gold);font-weight:700;text-transform:uppercase;margin-bottom:12px}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);padding:12px 26px;border-radius:28px;font-size:14px;font-weight:700;z-index:9999;pointer-events:none;max-width:90vw;text-align:center;animation:tUp .3s ease}
@keyframes tUp{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.loading{display:flex;align-items:center;justify-content:center;padding:60px 20px;gap:12px}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:32px 20px;color:var(--muted);font-size:13px}
@media(max-width:480px){.content{padding:12px}.tgrid{grid-template-columns:1fr 1fr}.tb-title{font-size:13px}}
@media(max-width:360px){.tgrid{grid-template-columns:1fr}.stats-row{grid-template-columns:1fr 1fr}.nav-grid{grid-template-columns:1fr}.erow{flex-direction:column}}
</style>
</head>

var PWD = {};
function initPWD() {
  var stored = localStorage.getItem('cb_pw');
  if (stored) { try { PWD = JSON.parse(stored); } catch(e) { PWD = {}; } }
  EMPLOYEES.forEach(function(e) {
    if (!PWD[e.id]) PWD[e.id] = (e.role === 'admin') ? 'Admin@2027' : 'Bank@2027';
  });
  localStorage.setItem('cb_pw', JSON.stringify(PWD));
}
function savePWD() { localStorage.setItem('cb_pw', JSON.stringify(PWD)); }
function resetEmpPwd(empId) {
  var emp = getEmp(empId); if (!emp) return;
  PWD[empId] = (emp.role === 'admin') ? 'Admin@2027' : 'Bank@2027';
  savePWD();
  showToast('\u2705 ' + emp.name.split(' ')[0] + "\u2019s password reset to default");
  var el = document.getElementById('pwStatus_' + empId);
  if (el) { el.textContent = '\u2705 Reset done'; }
}

// HELPERS
// ═══════════════════════════════════════════
function getEmp(id) { return EMPLOYEES.find(function(e) { return e.id === id; }); }
function getBr(id) { return BRANCHES.find(function(b) { return b.id === id; }); }
function getBrEmps(brId) { return EMPLOYEES.filter(function(e) { return e.br === brId && e.role !== 'admin'; }); }
function today() { return new Date().toISOString().slice(0,10); }
function fmtD(s) { if(!s) return ''; var p=s.split('-'); return p[2]+'-'+p[1]+'-'+p[0]; }
function fmtT(ts) { if(!ts) return ''; try { return new Date(ts).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true}); } catch(e) { return ''; } }
function L(n) {
  var v = +(n || 0);
  var rupees = Math.round(v * 100000);
  if (rupees === 0) return '0';
  var s = rupees.toString();
  if (s.length <= 3) return s;
  var last3 = s.slice(-3);
  var rest = s.slice(0, -3);
  var parts = [];
  while (rest.length > 2) { parts.unshift(rest.slice(-2)); rest = rest.slice(0, -2); }
  if (rest.length > 0) parts.unshift(rest);
  return parts.join(',') + ',' + last3;
}
function INI(nm) { return nm.trim().split(/\s+/).map(function(w){return w[0];}).join('').slice(0,2).toUpperCase(); }
function PCT(a,t) { return t ? Math.min(+(a/t*100).toFixed(1), 999.9) : 0; }
function CLR(p) { return p>=75 ? 'var(--green)' : p>=50 ? 'var(--amber)' : 'var(--red)'; }
function LBL(p) { return p>=100 ? 'Excellent' : p>=75 ? 'On Track' : p>=50 ? 'At Risk' : 'Critical'; }

function empTot(id, type) {
  var all = ENTRIES.filter(function(e){ return e.empId === id; });
  var t = today(); var parts = t.split('-'); var y = parts[0]; var m = parts[1];
  var FY = ['2026-04','2026-05','2026-06','2026-07','2026-08','2026-09','2026-10','2026-11','2026-12','2027-01','2027-02','2027-03'];
  function sum(arr) { return arr.reduce(function(a,e){ return {dep: a.dep+(+e.dep||0), adv: a.adv+(+e.adv||0)}; }, {dep:0,adv:0}); }
  if (type==='day') return sum(all.filter(function(e){ return e.date===t; }));
  if (type==='week') { var w=new Date(); w.setDate(w.getDate()-7); return sum(all.filter(function(e){ return new Date(e.date)>=w; })); }
  if (type==='month') return sum(all.filter(function(e){ return e.date.indexOf(y+'-'+m)===0; }));
  if (type==='year') return sum(all.filter(function(e){ return FY.some(function(f){ return e.date.indexOf(f)===0; }); }));
  return {dep:0,adv:0};
}
function brTot(brId, type) {
  return getBrEmps(brId).reduce(function(t,e){ var v=empTot(e.id,type); return {dep:t.dep+v.dep,adv:t.adv+v.adv}; }, {dep:0,adv:0});
}

function prog(p,c) {
  var col = c||CLR(p);
  return '<div class="prog"><div class="prog-fill" style="width:'+Math.min(p,100)+'%;background:'+col+'"></div></div><div class="prog-lbl">'+p.toFixed(1)+'% achieved</div>';
}
function badge(p) { return '<span class="badge" style="background:'+CLR(p)+'">'+LBL(p)+'</span>'; }
function circProgress(p) {
  var r=50, c=2*Math.PI*r, fill=(Math.min(p,100)/100)*c, color=CLR(p);
  return '<div class="circ-wrap"><div class="circ-svg-wrap"><svg width="120" height="120" viewBox="0 0 120 120"><circle cx="60" cy="60" r="'+r+'" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="10"/><circle cx="60" cy="60" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="10" stroke-dasharray="'+fill+' '+c+'" stroke-linecap="round"/></svg><div class="circ-inner"><div class="circ-pct" style="color:'+color+'">'+p.toFixed(1)+'%</div><div class="circ-lbl">Overall</div></div></div></div>';
}
function perfBlock(title,dT,aT,dA,aA) {
  var dp=PCT(dA,dT), ap=PCT(aA,aT), op=(dp+ap)/2;
  return '<div class="perf-card"><div class="ph"><span class="ph-title">'+title+'</span>'+badge(op)+'</div>'+
    '<div style="background:rgba(255,255,255,.04);border-radius:10px;padding:10px;margin-bottom:10px">'+
    '<div class="prow"><span class="pl">🏦 Deposit Target</span><span class="pv sv-gold">'+L(dT)+'</span></div>'+
    '<div class="prow"><span class="pl">✅ Achieved</span><span class="pv sv-green">'+L(dA)+'</span></div>'+
    '<div class="prow"><span class="pl">❌ Gap</span><span class="pv sv-red">'+L(Math.max(0,dT-dA))+'</span></div>'+prog(dp)+'</div>'+
    '<div style="background:rgba(255,255,255,.04);border-radius:10px;padding:10px">'+
    '<div class="prow"><span class="pl">💰 Advance Target</span><span class="pv sv-gold">'+L(aT)+'</span></div>'+
    '<div class="prow"><span class="pl">✅ Achieved</span><span class="pv sv-green">'+L(aA)+'</span></div>'+
    '<div class="prow"><span class="pl">❌ Gap</span><span class="pv sv-red">'+L(Math.max(0,aT-aA))+'</span></div>'+prog(ap)+'</div></div>';
}

function navigate(page, data, push) {
  if (push !== false) NAV.push({page:page, data:data});
  updateTopbar();
  document.getElementById('MC').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  setTimeout(function() {
    if (page==='emp') renderEmp(data);
    else if (page==='mgr') renderMgr();
    else if (page==='mgrEmp') renderMgrEmp(data);
    else if (page==='ho') renderHO();
    else if (page==='hoBr') renderHOBranches();
    else if (page==='hoBranch') renderHOBranch(data);
    else if (page==='hoEmp') renderHOEmp(data);
    else if (page==='hoDir') renderHODir();
    else if (page==='hoAna') renderHOAna();
    else if (page==='hoGap') renderHOGap();
    else if (page==='hoPwd') renderHOPwd();
  }, 50);
}
function goBack() {
  if (NAV.length <= 1) return;
  NAV.pop();
  var p = NAV[NAV.length-1];
  navigate(p.page, p.data, false);
}
function updateTopbar() {
  var cur = NAV[NAV.length-1];
  var hasBack = NAV.length > 1;
  var tbL = document.getElementById('tbL');
  var tbR = document.getElementById('tbR');
  if (!tbL) return;
  tbL.innerHTML = (hasBack ? '<button class="back-btn" onclick="goBack()">&#8592;</button>' : '') +
    '<div><div class="tb-title" id="tbT"></div><div class="tb-sub" id="tbS"></div></div>';
  if (CU && CU.role==='admin') {
    tbR.innerHTML = '<button class="btn-reset" onclick="openReset()">⚠️ Reset</button><button class="btn-logout" onclick="logout()">Logout</button>';
  } else {
    tbR.innerHTML = '<button class="btn-logout" onclick="logout()">Logout</button>';
  }
  var tt = document.getElementById('tbT'); var ts = document.getElementById('tbS');
  if (!cur || !tt) return;
  if (cur.page==='emp') { tt.textContent=CU.name.split(' ')[0]+"'s Dashboard"; ts.textContent=getBr(CU.br)?getBr(CU.br).name:''; }
  else if (cur.page==='mgr') { tt.textContent='Branch Dashboard'; ts.textContent=getBr(CU.br)?getBr(CU.br).name:''; }
  else if (cur.page==='mgrEmp') { var e=getEmp(cur.data); tt.textContent=e?e.name.split(' ')[0]:'Employee'; ts.textContent=e?e.desig:''; }
  else if (cur.page==='ho') { tt.textContent='Head Office'; ts.textContent='All Branches'; }
  else if (cur.page==='hoBr') { tt.textContent='All Branches'; ts.textContent='11 branches'; }
  else if (cur.page==='hoBranch') { var b=getBr(cur.data); tt.textContent=b?b.name:'Branch'; ts.textContent=getBrEmps(cur.data).length+' members'; }
  else if (cur.page==='hoEmp') { var e2=getEmp(cur.data); tt.textContent=e2?e2.name:'Employee'; ts.textContent=e2?e2.desig:''; }
  else if (cur.page==='hoDir') { tt.textContent='Staff Directory'; ts.textContent=EMPLOYEES.filter(function(e){return e.role!=='admin';}).length+' staff'; }
  else if (cur.page==='hoAna') { tt.textContent='Analytics'; ts.textContent='Rankings'; }
  else if (cur.page==='hoGap') { tt.textContent='Gap Report'; ts.textContent='Critical performers'; }
  else if (cur.page==='hoPwd') { tt.textContent='Password Management'; ts.textContent='Reset staff passwords'; }
}

function login() {
  var rawId = document.getElementById('uid').value.trim();
  var pw = document.getElementById('upw').value;
  var err = document.getElementById('lerr');
  err.textContent = '';
  if (!rawId || !pw) { err.textContent = 'Please enter Employee ID and Password.'; return; }
  var id = rawId.toUpperCase();
  var emp = getEmp(id) || getEmp(rawId);
  if (!emp || PWD[emp.id] !== pw) { err.textContent = 'Invalid Employee ID or Password.'; return; }
  // Credentials correct — login immediately
  CU = emp;
  localStorage.setItem('cb_s', emp.id);
  ENTRIES = localGet();
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').classList.remove('hidden');
  NAV = [];
  startApp();
  // Load cloud data in background
  if (USE_CLOUD) { setTimeout(refreshCloud, 500); }
}

function logout() {
  localStorage.removeItem('cb_s');
  CU = null; NAV = []; ENTRIES = [];
  document.getElementById('appShell').classList.add('hidden');
  document.getElementById('loginScreen').style.display = '';
  document.getElementById('uid').value = '';
  document.getElementById('upw').value = '';
}

function startApp() {
  if (CU.role==='admin') navigate('ho', null);
  else if (CU.role==='manager') navigate('mgr', null);
  else navigate('emp', null);
}

// STRICT: Always show login page on every open — no auto-login ever
(function(){
  localStorage.removeItem('cb_s');
  CU = null; NAV = []; ENTRIES = [];
  initPWD(); // load/init passwords from localStorage
  var ls = document.getElementById('loginScreen');
  var as = document.getElementById('appShell');
  if (ls) { ls.style.display = ''; ls.style.visibility = 'visible'; }
  if (as) { as.className = 'hidden'; }
})();

// Auto-refresh every 30s from cloud
setInterval(function() {
  if (USE_CLOUD && CU) { refreshCloud(); }
}, 30000);

// Sync across tabs
window.addEventListener('storage', function(e) {
  if (e.key === 'cb_e' && CU) {
    ENTRIES = localGet();
    var cur = NAV[NAV.length-1];
    if (cur) navigate(cur.page, cur.data, false);
  }
});

// ═══════════════════════════════════════════
// RESET (Admin only)
// ═══════════════════════════════════════════
function openReset() {
  document.getElementById('DT').textContent = 'Reset All Data';
  document.getElementById('DB').innerHTML = '<p style="font-size:13px;color:var(--muted);line-height:1.65">This deletes ALL entered performance data across all branches.<br><br><strong style="color:#e74c3c">Cannot be undone.</strong></p>';
  var ok = document.getElementById('DOK');
  ok.className = 'btn-danger'; ok.textContent = 'Delete All'; ok.onclick = doReset;
  document.getElementById('DLG').classList.remove('hidden');
}
function doReset() {
  closeDlg();
  cloudDeleteAll().then(function() {
    ENTRIES = []; localSave([]);
    showToast('✅ All entries cleared');
    var cur = NAV[NAV.length-1]; if (cur) navigate(cur.page, cur.data, false);
  });
}

// ═══════════════════════════════════════════
// DELETE SINGLE ENTRY (Undo)
// ═══════════════════════════════════════════
function confirmDeleteEntry(entryId, empId) {
  var r = ENTRIES.find(function(e){ return e.id === entryId; });
  if (!r) return;
  document.getElementById('DT').textContent = 'Delete This Entry?';
  document.getElementById('DB').innerHTML =
    '<div class="drow"><span>Date</span><span style="color:var(--gold);font-weight:700">'+fmtD(r.date)+'</span></div>'+
    '<div class="drow"><span>Deposits</span><span style="color:#27ae60;font-weight:700">'+L(r.dep)+'</span></div>'+
    '<div class="drow"><span>Advances</span><span style="color:var(--gold);font-weight:700">'+L(r.adv)+'</span></div>'+
    '<p style="font-size:12px;color:var(--muted);margin-top:12px">This entry will be permanently removed.</p>';
  var ok = document.getElementById('DOK');
  ok.className = 'btn-danger'; ok.textContent = '🗑️ Delete Entry';
  ok.onclick = function() { closeDlg(); deleteEntry(entryId, empId); };
  document.getElementById('DLG').classList.remove('hidden');
}

function deleteEntry(entryId, empId) {
  ENTRIES = ENTRIES.filter(function(e){ return e.id !== entryId; });
  localSave(ENTRIES);
  cloudDeleteOne(entryId).then(function(){ localStorage.setItem('cb_upd', Date.now()); });
  showToast('✅ Entry deleted');
  renderEmpHist(empId);
  var pz = document.getElementById('ePZ');
  if (pz) {
    var emp = getEmp(empId);
    if (emp) { var ya = empTot(empId,'year'); pz.innerHTML = perfBlock('FY 2026-27',emp.depT,emp.advT,ya.dep,ya.adv); }
  }
}
function closeDlg() {
  document.getElementById('DLG').classList.add('hidden');
  var ok = document.getElementById('DOK');
  ok.className = 'btn-confirm'; ok.textContent = 'Save'; ok.onclick = null; ok.style.display = '';
}

// ═══════════════════════════════════════════
// SAVE ENTRY
// ═══════════════════════════════════════════
function saveEntry(empId, dep, adv) {
  if (!dep && !adv) { showToast('Enter at least one value', '#D97706'); return; }
  var rec = { id: Date.now().toString(), empId: empId, date: today(), ts: new Date().toISOString(), dep: dep, adv: adv };
  ENTRIES.push(rec);
  localSave(ENTRIES);
  if (USE_CLOUD) { cloudPost(rec).then(function(){ localStorage.setItem('cb_upd', Date.now()); }); }
  showToast('✅ Entry saved!');
}
function openEntryDlg(empId) {
  var dep = Math.round((parseFloat(document.getElementById('eDep').value) || 0) / 100000 * 1e10) / 1e10;
  var adv = Math.round((parseFloat(document.getElementById('eAdv').value) || 0) / 100000 * 1e10) / 1e10;
  if (!dep && !adv) { showToast('Enter at least one value', '#D97706'); return; }
  document.getElementById('DT').textContent = 'Confirm Entry';
  document.getElementById('DB').innerHTML =
    '<div class="drow"><span>Date</span><span style="color:var(--gold);font-weight:700">'+fmtD(today())+'</span></div>'+
    '<div class="drow"><span>Deposits</span><span style="color:#27ae60;font-weight:700">'+L(dep)+'</span></div>'+
    '<div class="drow"><span>Advances</span><span style="color:var(--gold);font-weight:700">'+L(adv)+'</span></div>';
  var ok = document.getElementById('DOK');
  ok.className = 'btn-confirm'; ok.textContent = 'Save';
  ok.onclick = function() {
    closeDlg();
    saveEntry(empId, dep, adv);
    var de = document.getElementById('eDep'); var ae = document.getElementById('eAdv');
    if (de) de.value = ''; if (ae) ae.value = '';
    var cur = NAV[NAV.length-1]; navigate(cur.page, cur.data, false);
  };
  document.getElementById('DLG').classList.remove('hidden');
}

function renderEmpPerf(emp) {
  var el = document.getElementById('ePZ'); if (!el) return;
  var dD=+(emp.depT/252).toFixed(2), dA=+(emp.advT/252).toFixed(2);
  var mD=+(emp.depT/12).toFixed(2), mA=+(emp.advT/12).toFixed(2);
  var da=empTot(emp.id,'day'), wa=empTot(emp.id,'week'), ma=empTot(emp.id,'month'), ya=empTot(emp.id,'year');
  if (empTab==='daily') el.innerHTML=perfBlock("Today",dD,dA,da.dep,da.adv);
  else if (empTab==='weekly') el.innerHTML=perfBlock('This Week',dD*7,dA*7,wa.dep,wa.adv);
  else if (empTab==='monthly') el.innerHTML=perfBlock('This Month',mD,mA,ma.dep,ma.adv);
  else if (empTab==='yearly') el.innerHTML=perfBlock('FY 2026-27',emp.depT,emp.advT,ya.dep,ya.adv);
  else {
    var gd=ya.dep-emp.p26d, ga=ya.adv-emp.p26a;
    el.innerHTML='<div class="perf-card"><div class="ph"><span class="ph-title">Year-on-Year</span></div>'+
      '<div style="background:rgba(255,255,255,.04);border-radius:10px;padding:10px;margin-bottom:10px">'+
      '<div style="font-size:11px;color:var(--gold);font-weight:700;margin-bottom:6px;text-transform:uppercase">Deposits</div>'+
      '<div class="prow"><span class="pl">FY 2025-26 Closing</span><span class="pv">'+L(emp.p26d)+'</span></div>'+
      '<div class="prow"><span class="pl">FY 2026-27 Target</span><span class="pv">'+L(emp.depT)+'</span></div>'+
      '<div class="prow"><span class="pl">Achieved (YTD)</span><span class="pv sv-gold">'+L(ya.dep)+'</span></div>'+
      '<div class="prow"><span class="pl">Growth</span><span class="pv" style="color:'+(gd>=0?'var(--green)':'var(--red)')+';">'+(gd>=0?'▲ +':'▼ ')+L(Math.abs(gd))+'</span></div></div>'+
      '<div style="background:rgba(255,255,255,.04);border-radius:10px;padding:10px">'+
      '<div style="font-size:11px;color:var(--gold);font-weight:700;margin-bottom:6px;text-transform:uppercase">Advances</div>'+
      '<div class="prow"><span class="pl">FY 2025-26 Closing</span><span class="pv">'+L(emp.p26a)+'</span></div>'+
      '<div class="prow"><span class="pl">FY 2026-27 Target</span><span class="pv">'+L(emp.advT)+'</span></div>'+
      '<div class="prow"><span class="pl">Achieved (YTD)</span><span class="pv sv-gold">'+L(ya.adv)+'</span></div>'+
      '<div class="prow"><span class="pl">Growth</span><span class="pv" style="color:'+(ga>=0?'var(--green)':'var(--red)')+';">'+(ga>=0?'▲ +':'▼ ')+L(Math.abs(ga))+'</span></div></div></div>';
  }
}
function renderEmpHist(empId) {
  var el = document.getElementById('eHZ'); if (!el) return;
  var rows = ENTRIES.filter(function(e){ return e.empId===empId; }).sort(function(a,b){ return String(b.ts).localeCompare(String(a.ts)); }).slice(0,50);
  if (!rows.length) { el.innerHTML='<div class="empty">No entries yet.</div>'; return; }
  el.innerHTML = rows.map(function(r) {
    var eid = (r.id||'').replace(/'/g,"\\'");
    return '<div class="hist-item">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'+
      '<div class="hist-date">📅 '+fmtD(r.date)+' &nbsp; 🕐 '+fmtT(r.ts)+'</div>'+
      '<button onclick="confirmDeleteEntry(\''+eid+'\',\''+empId+'\')" style="background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.4);color:#e74c3c;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0">🗑️ Delete</button>'+
      '</div>'+
      '<div class="hist-row">'+
      '<div class="hist-val"><div class="hv sv-green">'+L(r.dep)+'</div><div class="hl">Deposits</div></div>'+
      '<div class="hist-val"><div class="hv sv-gold">'+L(r.adv)+'</div><div class="hl">Advances</div></div>'+
      '</div></div>';
  }).join('');
}
function eTab(el, tab, empId) {
  empTab=tab;
  var tabs = document.querySelectorAll('#eTabs .tab');
  for (var i=0;i<tabs.length;i++) tabs[i].classList.remove('active');
  el.classList.add('active');
  renderEmpPerf(getEmp(empId));
}

function renderMgrEmpPerf(emp) {
  var el=document.getElementById('ePZ'); if (!el) return;

  var mD=+(emp.depT/12).toFixed(2), mA=+(emp.advT/12).toFixed(2);
  var da=empTot(emp.id,'day'), wa=empTot(emp.id,'week'), ma=empTot(emp.id,'month'), ya=empTot(emp.id,'year');
  if (mgrEmpTab==='daily')       el.innerHTML=perfBlock('Today',dD,dA,da.dep,da.adv);
  else if (mgrEmpTab==='weekly') el.innerHTML=perfBlock('This Week',dD*7,dA*7,wa.dep,wa.adv);
  else if (mgrEmpTab==='monthly')el.innerHTML=perfBlock('This Month',mD,mA,ma.dep,ma.adv);
  else if (mgrEmpTab==='yearly') el.innerHTML=perfBlock('FY 2026-27 Annual',emp.depT,emp.advT,ya.dep,ya.adv);

function meTab(el, tab, empId) {
  mgrEmpTab=tab;

function mgrSave(empId) {
  var dep=Math.round((parseFloat(document.getElementById('mD').value)||0)/100000*1e10)/1e10;
  var adv=Math.round((parseFloat(document.getElementById('mA').value)||0)/100000*1e10)/1e10;

    renderEmpHist(empId); }

    '<div class="sec-lbl">Employees — Highest Gap First</div>'+
    emps.map(function(e){
      var b=getBr(e.br);
      return '<div class="ana-row" onclick="navigate(\'hoEmp\',\''+e.id+'\')">'+
        '<div class="ana-head"><div><div class="ana-name">'+e.name+'</div><div class="ana-branch">'+e.desig+' · '+(b?b.name:'')+'</div></div>'+
        '<span class="badge" style="background:'+CLR(e.p)+'">'+e.p.toFixed(1)+'%</span></div>'+
        '<div class="prow"><span class="pl">Deposit Gap</span><span class="pv sv-red">'+L(e.dg)+'</span></div>'+
        '<div class="prow"><span class="pl">Advance Gap</span><span class="pv" style="color:var(--amber)">'+L(e.ag)+'</span></div></div>';
    }).join('')+
    '<div class="sec-lbl" style="margin-top:16px">Branch Gap</div>'+
    BRANCHES.map(function(b){
      var yt=brTot(b.id,'year'); var dg=Math.max(0,b.depT-yt.dep),ag=Math.max(0,b.advT-yt.adv);
      var op=(PCT(yt.dep,b.depT)+PCT(yt.adv,b.advT))/2;
      return '<div class="ana-row" onclick="navigate(\'hoBranch\',\''+b.id+'\')">'+
        '<div class="ana-head"><div class="ana-name">'+b.name+'</div><span class="badge" style="background:'+CLR(op)+'">'+op.toFixed(1)+'%</span></div>'+
        '<div class="prow"><span class="pl">Deposit Gap</span><span class="pv sv-red">'+L(dg)+'</span></div>'+
        '<div class="prow"><span class="pl">Advance Gap</span><span class="pv" style="color:var(--amber)">'+L(ag)+'</span></div></div>';
    }).join('');
}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
function showToast(msg, color) {
  var c = color || '#1A7A4A';
  var el = document.querySelectorAll('.toast');
  for (var i=0;i<el.length;i++) el[i].parentNode.removeChild(el[i]);
  var t = document.createElement('div');
  t.className='toast'; t.textContent=msg; t.style.background=c; t.style.color='#fff';
  document.body.appendChild(t);
  setTimeout(function(){ if(t.parentNode) t.parentNode.removeChild(t); }, 3000);
}
// ═══════════════════════════════════════════
// CHANGE PASSWORD (any logged-in user)
// ═══════════════════════════════════════════
function openChangePwd() {
  document.getElementById('DT').textContent = '🔑 Change My Password';
  document.getElementById('DB').innerHTML =
    '<label class="lbl" style="margin-top:4px">Current Password</label>'+
    '<input class="inp" type="password" id="cpOld" placeholder="Current password"/>'+
    '<label class="lbl">New Password (min 6 chars)</label>'+
    '<input class="inp" type="password" id="cpNew" placeholder="New password"/>'+
    '<label class="lbl">Confirm New Password</label>'+
    '<input class="inp" type="password" id="cpConf" placeholder="Confirm new password"/>'+
    '<p id="cpErr" style="color:#e74c3c;font-size:12px;margin-top:4px;min-height:16px"></p>';
  var ok = document.getElementById('DOK');
  ok.className = 'btn-confirm'; ok.textContent = '🔑 Change Password'; ok.onclick = doChangePwd;
  document.getElementById('DLG').classList.remove('hidden');
}
function doChangePwd() {
  var old = document.getElementById('cpOld').value;
  var nw  = document.getElementById('cpNew').value;
  var cf  = document.getElementById('cpConf').value;
  var err = document.getElementById('cpErr');
  if (!old||!nw||!cf) { err.textContent='All fields are required.'; return; }
  if (PWD[CU.id] !== old) { err.textContent='Current password is incorrect.'; return; }
  if (nw.length < 6) { err.textContent='New password must be at least 6 characters.'; return; }
  if (nw !== cf) { err.textContent='New passwords do not match.'; return; }
  PWD[CU.id] = nw; savePWD(); closeDlg();
  showToast('✅ Password changed successfully!');
}

// EXCEL EXPORT (Admin — Today / This Week / Annual)
// ═══════════════════════════════════════════
function showExportDlg() {
  document.getElementById('DT').textContent = '📥 Download Excel Report';
  document.getElementById('DB').innerHTML =
    '<p style="font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.65">Each file includes a period summary, Annual YTD, and Branch sheet.</p>'+
    '<div style="display:flex;flex-direction:column;gap:10px">'+
    '<button onclick="closeDlg();exportExcel(\'day\')" style="background:linear-gradient(135deg,#1a3a5f,#234870);border:1.5px solid var(--gold);color:var(--gold);border-radius:12px;padding:14px;font-size:14px;font-weight:700;cursor:pointer">📅 Today\'s Report</button>'+
    '<button onclick="closeDlg();exportExcel(\'week\')" style="background:linear-gradient(135deg,#1a3a5f,#234870);border:1.5px solid var(--gold);color:var(--gold);border-radius:12px;padding:14px;font-size:14px;font-weight:700;cursor:pointer">📆 This Week\'s Report</button>'+
    '<button onclick="closeDlg();exportExcel(\'year\')" style="background:linear-gradient(135deg,#1a3a5f,#234870);border:1.5px solid var(--gold);color:var(--gold);border-radius:12px;padding:14px;font-size:14px;font-weight:700;cursor:pointer">📊 Annual YTD Report</button>'+
    '</div>';
  var ok = document.getElementById('DOK'); ok.style.display='none';
  document.getElementById('DLG').classList.remove('hidden');
}
function exportExcel(period) {
  if (typeof XLSX === 'undefined') { showToast('Excel library loading... try again in 2s', '#D97706'); return; }
  var type = period || 'day';
  var label = type==='day' ? 'Today' : type==='week' ? 'This_Week' : 'Annual_YTD';
  var wb = XLSX.utils.book_new();
  // Sheet 1: Period summary
  var hdr = ['Employee','Branch','Designation','Dep Target','Dep Achieved','Adv Target','Adv Achieved','Dep %','Adv %','Overall %'];
  var rows = [hdr];
  EMPLOYEES.filter(function(e){return e.role!=='admin';}).forEach(function(e){
    var ta = empTot(e.id, type==='year'?'year':type);
    var dT, aT;
    if (type==='day')  { dT=+(e.depT/252).toFixed(2);   aT=+(e.advT/252).toFixed(2); }
    else if (type==='week') { dT=+(e.depT/252*7).toFixed(2); aT=+(e.advT/252*7).toFixed(2); }
    else               { dT=e.depT;                     aT=e.advT; }
    var dp=PCT(ta.dep,dT), ap=PCT(ta.adv,aT);
    var br=getBr(e.br);
    rows.push([e.name, br?br.name:'', e.desig, dT, ta.dep, aT, ta.adv, dp.toFixed(1)+'%', ap.toFixed(1)+'%', ((dp+ap)/2).toFixed(1)+'%']);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), label.replace('_',' '));
  // Sheet 2: Annual YTD (always included)
  var hdr2 = ['Employee','Branch','Designation','Ann Dep Target','Dep Achieved','Dep Gap','Dep %','Ann Adv Target','Adv Achieved','Adv Gap','Adv %','Overall %'];
  var rows2 = [hdr2];
  EMPLOYEES.filter(function(e){return e.role!=='admin';}).forEach(function(e){
    var ya=empTot(e.id,'year');
    var dp=PCT(ya.dep,e.depT), ap=PCT(ya.adv,e.advT);
    var br=getBr(e.br);
    rows2.push([e.name, br?br.name:'', e.desig, e.depT, ya.dep, Math.max(0,e.depT-ya.dep), dp.toFixed(1)+'%', e.advT, ya.adv, Math.max(0,e.advT-ya.adv), ap.toFixed(1)+'%', ((dp+ap)/2).toFixed(1)+'%']);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows2), 'Annual YTD');
  // Sheet 3: Branch summary
  var hdr3 = ['Branch','Dep Target','Dep Achieved','Dep Gap','Dep %','Adv Target','Adv Achieved','Adv Gap','Adv %','Overall %'];
  var rows3 = [hdr3];
  BRANCHES.forEach(function(b){
    var yt=brTot(b.id,'year');
    var dp=PCT(yt.dep,b.depT), ap=PCT(yt.adv,b.advT);
    rows3.push([b.name, b.depT, yt.dep, Math.max(0,b.depT-yt.dep), dp.toFixed(1)+'%', b.advT, yt.adv, Math.max(0,b.advT-yt.adv), ap.toFixed(1)+'%', ((dp+ap)/2).toFixed(1)+'%']);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows3), 'Branch Summary');
  XLSX.writeFile(wb, 'CoastalBank_' + label + '_' + today() + '.xlsx');
  showToast('✅ Excel report downloaded!');
}
